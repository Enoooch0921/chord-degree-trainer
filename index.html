<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chord Mastery Pro (+Audio)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-grad: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
               radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
               radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    --card-bg: rgba(30, 35, 60, 0.7);
    --card-border: rgba(255, 255, 255, 0.1);
    --primary: #8b5cf6;
    --primary-glow: rgba(139, 92, 246, 0.5);
    --correct: #10b981;
    --wrong: #ef4444;
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --font: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; font-family: var(--font);
    background-color: #0f172a; background-image: var(--bg-grad);
    background-attachment: fixed; background-size: cover;
    color: var(--text-main); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
  }

  /* 動態背景 */
  .orb {
    position: absolute; width: 50vh; height: 50vh;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%; z-index: -1; animation: float 10s infinite ease-in-out;
  }
  .orb:nth-child(1) { top: -10%; left: -10%; animation-delay: 0s; }
  .orb:nth-child(2) { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, rgba(0,0,0,0) 70%); animation-delay: -5s; }
  @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, 20px); } }

  .app-container {
    width: 100%; max-width: 480px; height: 100vh; max-height: 900px;
    display: flex; flex-direction: column; padding: 24px; position: relative; z-index: 10;
  }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .brand { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .brand span { color: var(--primary); }
  
  .btn-icon {
    background: rgba(255,255,255,0.1); border: 1px solid var(--card-border);
    color: white; width: 40px; height: 40px; border-radius: 12px;
    display: grid; place-items: center; cursor: pointer; transition: 0.2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.2); }

  .stats-bar { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
  .stat-pill {
    background: rgba(0,0,0,0.3); border: 1px solid var(--card-border);
    padding: 6px 16px; border-radius: 99px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }

  .stage {
    flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; margin-bottom: 40px;
  }
  .key-label {
    font-size: 14px; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px; background: rgba(139, 92, 246, 0.1); padding: 4px 12px; border-radius: 6px;
  }
  
  .q-wrapper { display: flex; align-items: center; gap: 12px; }
  .question-text {
    font-size: 72px; font-weight: 800; line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  
  /* 播放按鈕小喇叭 */
  .btn-play {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: pointer;
    display: grid; place-items: center; transition: 0.2s;
  }
  .btn-play:hover { background: var(--primary); color: white; border-color: transparent; }
  .btn-play.playing { animation: pulse 1s infinite; color: var(--primary); background: rgba(139, 92, 246, 0.1); border-color: var(--primary); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }

  .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 20px; }
  .choice-btn {
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    border: 1px solid var(--card-border); color: white; padding: 20px; border-radius: 20px;
    font-size: 20px; font-weight: 700; cursor: pointer;
    transition: all 0.15s ease; position: relative; overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .choice-btn:active { transform: scale(0.96); }
  .choice-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
  .choice-btn.correct { background: var(--correct); border-color: var(--correct); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
  .choice-btn.wrong { background: var(--wrong); border-color: var(--wrong); animation: shake 0.4s; }
  
  .hint-sub { font-size: 12px; font-weight: 400; opacity: 0.6; margin-top: 4px; display: block;}

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    display: flex; align-items: flex-end;
  }
  @media(min-width: 500px) { .modal-overlay { align-items: center; justify-content: center; } }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  
  .modal-card {
    background: #1e1b2e; width: 100%; max-width: 420px;
    border-radius: 24px 24px 0 0; padding: 24px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    max-height: 85vh; overflow-y: auto; border: 1px solid var(--card-border);
  }
  @media(min-width: 500px) { .modal-card { border-radius: 24px; transform: scale(0.95); } }
  .modal-overlay.open .modal-card { transform: translateY(0); }
  @media(min-width: 500px) { .modal-overlay.open .modal-card { transform: scale(1); } }

  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-size: 20px; font-weight: 700; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
  
  select { width: 100%; background: #2a273f; color: white; border: 1px solid var(--card-border); padding: 12px; border-radius: 12px; font-size: 16px; appearance: none; outline: none; }
  .toggle-row { display: flex; gap: 10px; background: #2a273f; padding: 4px; border-radius: 12px; }
  .toggle-opt { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; opacity: 0.6; transition: 0.2s; }
  .toggle-opt.active { background: var(--primary); color: white; opacity: 1; font-weight: 600; }
  .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .timer-line { position: absolute; top: 0; left: 0; height: 3px; background: var(--primary); width: 0%; transition: width 0.1s linear; box-shadow: 0 0 10px var(--primary); }

  @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(2px); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <div class="orb"></div><div class="orb"></div>
  <div id="timerLine" class="timer-line"></div>

  <div class="app-container">
    <header>
      <div class="brand"><span>#</span> ChordPro</div>
      <div style="display:flex; gap:10px">
        <button class="btn-icon" id="btnSettings" title="設定"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-pill" style="color:var(--correct)"><span>✓</span> <span id="scoreOk">0</span></div>
      <div class="stat-pill" style="color:var(--wrong)"><span>✕</span> <span id="scoreBad">0</span></div>
      <div class="stat-pill" style="color:#fbbf24"><span>★</span> <span id="streak">0</span></div>
      <div class="stat-pill" style="color:#38bdf8"><span>%</span> <span id="scoreAcc">–</span></div>
    </div>

    <div class="stage">
      <div class="key-label" id="keyLabel">C MAJOR</div>
      <div class="q-wrapper">
        <div class="question-text" id="qText">?</div>
        <button class="btn-play hidden" id="replayBtn" title="播放聲音">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>
      </div>
      <div style="margin-top:10px; opacity:0.5; font-size:14px" id="qSub">請按開始</div>
    </div>

    <div class="controls" id="choicesGrid">
      <button class="choice-btn" style="grid-column: 1/-1" id="startBtn">開始練習</button>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
      <div class="modal-header"><div class="modal-title">設定</div><button class="btn-icon" style="background:transparent; border:none;" id="closeSettings">✕</button></div>
      
      <div class="form-group"><label class="form-label">練習模式</label><div class="toggle-row"><div class="toggle-opt active" data-grp="mode" data-val="chordToDegree">和弦 ➜ 級數</div><div class="toggle-opt" data-grp="mode" data-val="degreeToChord">級數 ➜ 和弦</div></div></div>
      <div class="form-group"><label class="form-label">主音設定 (Key)</label><select id="rootSelect"><option value="C">C Major</option><option value="G">G Major (1#)</option><option value="D">D Major (2#)</option><option value="A">A Major (3#)</option><option value="E">E Major (4#)</option><option value="B">B Major (5#)</option><option value="F#">F# Major (6#)</option><option value="C#">C# Major (7#)</option><option disabled>──────────</option><option value="F">F Major (1b)</option><option value="Bb">Bb Major (2b)</option><option value="Eb">Eb Major (3b)</option><option value="Ab">Ab Major (4b)</option><option value="Db">Db Major (5b)</option><option value="Gb">Gb Major (6b)</option><option value="Cb">Cb Major (7b)</option></select></div>
      <div class="form-group"><label class="form-label">出題範圍</label><div class="toggle-row"><div class="toggle-opt active" data-grp="keymode" data-val="fixed">固定調性</div><div class="toggle-opt" data-grp="keymode" data-val="random">隨機切換</div></div></div>
      <div class="form-group"><label class="form-label">調式 (Scale Type)</label><div class="toggle-row"><div class="toggle-opt active" data-grp="scaleType" data-val="major">大調 Major</div><div class="toggle-opt" data-grp="scaleType" data-val="minor">小調 Minor</div></div></div>
      <div class="form-group"><label class="form-label">和弦集</label><div class="toggle-row"><div class="toggle-opt active" data-grp="chordSet" data-val="diatonic">順階</div><div class="toggle-opt" data-grp="chordSet" data-val="advanced">進階（借用/副屬）</div></div></div>
      <div class="form-group">
        <label class="form-label">出題級數篩選</label>
        <div id="degreeFilterRow" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:4px"></div>
      </div>
      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
          <label class="form-label" style="margin:0">聲音回饋 (Audio)</label>
          <input type="checkbox" id="audioCheck" checked style="transform:scale(1.5)">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center">

          <input type="checkbox" id="timerCheck" style="transform:scale(1.5)">

        <div id="timerDurationRow" style="display:none; justify-content:space-between; align-items:center; margin-top:10px">

            <input type="number" id="timerSeconds" min="1" max="60" value="5" style="width:60px; padding:4px 8px; border-radius:8px; border:1px solid var(--card-border); background:#2a273f; color:var(--text-main); font-size:14px; text-align:center">
            <span style="color:var(--text-muted); font-size:13px">秒</span>

      <button class="btn-primary" id="resetBtn" style="background: #ef4444; margin-top:20px">重置分數</button>
      <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted)">訪問次數：<span id="visitCount">...</span></div>
    </div>
  </div>

  <div class="modal-overlay" id="summaryModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">第 <span id="summaryRound">1</span> 回合結果</div>
      </div>
      <div style="text-align:center; padding:10px 0 20px">
        <div style="font-size:48px; font-weight:800; color:var(--primary)" id="summaryAcc">–%</div>
        <div style="color:var(--text-muted); margin-top:4px">答題正確率</div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px">
        <div class="stat-pill" style="color:var(--correct); justify-content:center">✓ <span id="summaryOk">0</span></div>
        <div class="stat-pill" style="color:var(--wrong); justify-content:center">✕ <span id="summaryBad">0</span></div>
        <div class="stat-pill" style="color:#fbbf24; justify-content:center; grid-column:1/-1">最高連答 ★ <span id="summaryStreak">0</span></div>
      </div>
      <div id="summaryWeak" style="font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:16px"></div>
      <button class="btn-primary" id="summaryNextBtn">繼續練習</button>
    </div>
  </div>

<script>
(function(){
  // ==========================================
  // 🎵 AUDIO ENGINE (Web Audio API)
  // ==========================================
  const AudioEngine = {
    ctx: null,
    // Note Frequencies (Octave 4)
    noteFreqs: {
      'C': 261.63, 'C#': 277.18, 'Db': 277.18, 'D': 293.66, 'D#': 311.13, 'Eb': 311.13,
      'E': 329.63, 'F': 349.23, 'F#': 369.99, 'Gb': 369.99, 'G': 392.00, 'G#': 415.30, 
      'Ab': 415.30, 'A': 440.00, 'A#': 466.16, 'Bb': 466.16, 'B': 493.88, 'Cb': 493.88, // Cb=B
      'E#': 349.23, // E#=F
      'B#': 261.63 * 2 // B#=C(next octave)
    },
    
    init: function() {
      if(!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
    },

    playTone: function(freq, type='triangle', duration=0.8, startTime=0) {
      if(!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.type = type;
      osc.frequency.value = freq;
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      const now = this.ctx.currentTime + startTime;
      
      // Envelope
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.3, now + 0.05); // Attack
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration); // Decay
      
      osc.start(now);
      osc.stop(now + duration);
    },

    playChord: function(chordName) {
      this.init();
      // Parse chord name (e.g., "C", "F#m", "Gdim")
      let root = chordName.replace(/m|°/g, ''); 
      const isMinor = chordName.includes('m');
      const isDim = chordName.includes('°');

      let rootFreq = this.noteFreqs[root];
      if(!rootFreq) return; // Fallback

      // Calculate intervals (Semidtones)
      // Major: 0, 4, 7
      // Minor: 0, 3, 7
      // Dim:   0, 3, 6
      let thirdInterval = isMinor || isDim ? 3 : 4;
      let fifthInterval = isDim ? 6 : 7;

      const getFreq = (base, semi) => base * Math.pow(2, semi/12);
      
      // Play Triad
      this.playTone(rootFreq, 'triangle', 1.2, 0);
      this.playTone(getFreq(rootFreq, thirdInterval), 'triangle', 1.2, 0);
      this.playTone(getFreq(rootFreq, fifthInterval), 'triangle', 1.2, 0);
    }
  };

  // ==========================================
  // 🎼 MUSIC THEORY LOGIC
  // ==========================================
  const SCALE_DATA = {
    'C':  ['C', 'D', 'E', 'F', 'G', 'A', 'B'],
    'G':  ['G', 'A', 'B', 'C', 'D', 'E', 'F#'],
    'D':  ['D', 'E', 'F#', 'G', 'A', 'B', 'C#'],
    'A':  ['A', 'B', 'C#', 'D', 'E', 'F#', 'G#'],
    'E':  ['E', 'F#', 'G#', 'A', 'B', 'C#', 'D#'],
    'B':  ['B', 'C#', 'D#', 'E', 'F#', 'G#', 'A#'],
    'F#': ['F#', 'G#', 'A#', 'B', 'C#', 'D#', 'E#'],
    'C#': ['C#', 'D#', 'E#', 'F#', 'G#', 'A#', 'B#'],
    'F':  ['F', 'G', 'A', 'Bb', 'C', 'D', 'E'],
    'Bb': ['Bb', 'C', 'D', 'Eb', 'F', 'G', 'A'],
    'Eb': ['Eb', 'F', 'G', 'Ab', 'Bb', 'C', 'D'],
    'Ab': ['Ab', 'Bb', 'C', 'Db', 'Eb', 'F', 'G'],
    'Db': ['Db', 'Eb', 'F', 'Gb', 'Ab', 'Bb', 'C'],
    'Gb': ['Gb', 'Ab', 'Bb', 'Cb', 'Db', 'Eb', 'F'],
    'Cb': ['Cb', 'Db', 'Eb', 'Fb', 'Gb', 'Ab', 'Bb']
  };
  const ROMAN = ["I","ii","iii","IV","V","vi","vii°"];
  const QUAL = ['maj','min','min','maj','maj','min','dim'];
  const ROMAN_MINOR = ["i","ii°","♭III","iv","v","♭VI","♭VII"];
  const QUAL_MINOR  = ['min','dim','maj','min','min','maj','maj'];
  const SCALE_DATA_MINOR = {
    'A': ['A','B','C','D','E','F','G'],
    'E': ['E','F#','G','A','B','C','D'],
    'B': ['B','C#','D','E','F#','G','A'],
    'F#':['F#','G#','A','B','C#','D','E'],
    'C#':['C#','D#','E','F#','G#','A','B'],
    'G#':['G#','A#','B','C#','D#','E','F#'],
    'D#':['D#','E#','F#','G#','A#','B','C#'],
    'D': ['D','E','F','G','A','Bb','C'],
    'G': ['G','A','Bb','C','D','Eb','F'],
    'C': ['C','D','Eb','F','G','Ab','Bb'],
    'F': ['F','G','Ab','Bb','C','Db','Eb'],
    'Bb':['Bb','C','Db','Eb','F','Gb','Ab'],
    'Eb':['Eb','F','Gb','Ab','Bb','Cb','Db'],
    'Ab':['Ab','Bb','Cb','Db','Eb','Fb','Gb'],
  };

  // --- Chromatic chord helpers ---
  const NOTE_TO_SEMI = {
    'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,
    'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'Cb':11
  };
  const CHROMATIC_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const CHROMATIC_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
  const FLAT_KEYS = ['F','Bb','Eb','Ab','Db','Gb','Cb'];

  function getChromaticChords(key) {
    const semi = NOTE_TO_SEMI[key] ?? 0;
    const tbl = FLAT_KEYS.includes(key) ? CHROMATIC_FLAT : CHROMATIC_SHARP;
    const n = (s) => tbl[(semi + s) % 12];
    return [
      { roman:'II',    name:n(2),       plainName:n(2) },
      { roman:'III',   name:n(4),       plainName:n(4) },
      { roman:'iv',    name:n(5)+'m',   plainName:n(5)+'m' },
      { roman:'v',     name:n(7)+'m',   plainName:n(7)+'m' },
      { roman:'VI',    name:n(9),       plainName:n(9) },
      { roman:'♯IV°',  name:n(6)+'°',  plainName:n(6)+'°' },
      { roman:'♭VI',   name:n(8),       plainName:n(8) },
      { roman:'♭VII',  name:n(10),      plainName:n(10) },
    ];
  }

  // --- Helpers ---
  const formatNote = (str) => { if(!str) return ""; return str.replace(/b/g, '♭').replace(/#/g, '♯'); };
  const rand = n => Math.floor(Math.random()*n);
  const getTriads = (key) => {
    const isMinor = state.scaleType === 'minor';
    const data  = isMinor ? SCALE_DATA_MINOR : SCALE_DATA;
    const roman = isMinor ? ROMAN_MINOR : ROMAN;
    const qual  = isMinor ? QUAL_MINOR  : QUAL;
    let notes = data[key] || data['C'];
    return notes.map((n, i) => {
      const q = qual[i];
      let suffix = q === 'min' ? 'm' : (q === 'dim' ? '°' : '');
      return { degree: i, roman: roman[i], name: n + suffix, plainName: n + suffix };
    });
  };

  // --- STATE ---
  const state = {
    mode: 'chordToDegree',
    keymode: 'fixed',
    root: 'C',
    scaleType: 'major',
    timerEnabled: false,
    timerDuration: 5,
    audioEnabled: true,
    score: { ok:0, bad:0, streak:0 },
    current: null,
    lock: false,
    timer: null,
    started: false,
    chordSet: 'diatonic',
    degreeFilter: [0,1,2,3,4,5,6],
    questionCount: 0,
    roundSize: 10,
    roundBestStreak: 0,
    wrongByDegree: {}
  };

  // --- DOM ---
  const el = {
    keyLabel: document.getElementById('keyLabel'),
    qText: document.getElementById('qText'),
    qSub: document.getElementById('qSub'),
    grid: document.getElementById('choicesGrid'),
    scoreOk: document.getElementById('scoreOk'),
    scoreBad: document.getElementById('scoreBad'),
    streak: document.getElementById('streak'),
    scoreAcc: document.getElementById('scoreAcc'),
    modal: document.getElementById('settingsModal'),
    timerLine: document.getElementById('timerLine'),
    replayBtn: document.getElementById('replayBtn')
  };

  // --- GAME LOGIC ---
  function nextQuestion() {
    state.lock = false;
    stopTimer();
    el.replayBtn.classList.add('hidden'); // Hide audio button initially
    
    // Determine Key
    let currentKey = state.root;
    if(state.keymode === 'random') {
      const keys = Object.keys(SCALE_DATA);
      currentKey = keys[rand(keys.length)];
    }
    
    const diatonic = getTriads(currentKey);
    const chromatic = state.chordSet === 'advanced' ? getChromaticChords(currentKey) : [];
    const allChords = [...diatonic, ...chromatic];

    // Build target pool: filtered diatonic + all chromatic
    const filtDiatonic = diatonic.filter((_, i) => state.degreeFilter.includes(i));
    const targetPool = [...filtDiatonic, ...chromatic];

    const target = targetPool[rand(targetPool.length)];

    // Build displayed choices
    let choices;
    if (state.chordSet === 'advanced') {
      const wrongs = allChords.filter(c => c.roman !== target.roman);
      wrongs.sort(() => Math.random() - 0.5);
      choices = [target, ...wrongs.slice(0, 7)].sort(() => Math.random() - 0.5);
    } else {
      choices = diatonic;
    }

    const answerIdx = choices.findIndex(c => c.roman === target.roman);
    state.current = { key: currentKey, answerIdx, list: choices, target };

    // UI Update
    el.keyLabel.textContent = formatNote(currentKey) + (state.scaleType === 'minor' ? ' MINOR' : ' MAJOR');
    
    // Animation reset
    el.qText.style.transform = "scale(0.8)"; el.qText.style.opacity = "0";
    setTimeout(() => { el.qText.style.transform = "scale(1)"; el.qText.style.opacity = "1"; }, 50);

    if(state.mode === 'chordToDegree') {
      el.qText.textContent = formatNote(target.name);
      el.qSub.textContent = "它是第幾級？";
    } else {
      el.qText.textContent = target.roman;
      el.qSub.textContent = "這是什麼和弦？";
    }

    renderChoices(chords);
    if(state.timerEnabled) startTimer();
  }

  function renderChoices(chords) {
    el.grid.innerHTML = '';
    let indices = chords.map((_, i) => i);
    if(state.mode === 'degreeToChord') indices.sort(() => Math.random() - 0.5);
    const isAdvanced = state.chordSet === 'advanced';

    indices.forEach(idx => {
      const item = chords[idx];
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      if(isAdvanced) btn.style.fontSize = '16px';
      btn.dataset.idx = idx;

      if(state.mode === 'chordToDegree') {
        btn.innerHTML = `${item.roman}<span class="hint-sub">級數</span>`;
      } else {
        btn.innerHTML = `${formatNote(item.name)}<span class="hint-sub">和弦</span>`;
      }

      btn.onclick = () => checkAnswer(idx, btn);
      el.grid.appendChild(btn);
    });
  }

  function checkAnswer(idx, btn) {
    if(state.lock) return;
    state.lock = true;
    stopTimer();

    const isCorrect = idx === state.current.answerIdx;
    
    // 答題後顯示播放按鈕
    el.replayBtn.classList.remove('hidden');

    state.questionCount++;
    const isSummaryTime = state.questionCount % state.roundSize === 0;

    if(isCorrect) {
      btn.classList.add('correct');
      state.score.ok++;
      state.score.streak++;
      el.qSub.textContent = "Correct! 🎉";

      if(state.audioEnabled) {
        AudioEngine.playChord(state.current.target.plainName);
        el.replayBtn.classList.add('playing');
        setTimeout(()=>el.replayBtn.classList.remove('playing'), 800);
      }

      setTimeout(isSummaryTime ? showSummary : nextQuestion, 1200);
    } else {
      btn.classList.add('wrong');
      state.score.bad++;
      state.score.streak = 0;
      const r = state.current.target.roman;
      state.wrongByDegree[r] = (state.wrongByDegree[r] || 0) + 1;

      const correctBtn = el.grid.querySelector(`button[data-idx="${state.current.answerIdx}"]`);
      if(correctBtn) correctBtn.classList.add('correct');

      el.qSub.textContent = "Oops! 下一題...";
      setTimeout(isSummaryTime ? showSummary : nextQuestion, 1500);
    }
    updateScore();
  }

  function updateScore() {
    el.scoreOk.textContent = state.score.ok;
    el.scoreBad.textContent = state.score.bad;
    el.streak.textContent = state.score.streak;
    const total = state.score.ok + state.score.bad;
    el.scoreAcc.textContent = total ? Math.round(state.score.ok / total * 100) + '%' : '–';
  }

  // --- TIMER ---
  function startTimer() {
    const ms = state.timerDuration * 1000;
    el.timerLine.style.transition = 'none'; el.timerLine.style.width = '100%';
    void el.timerLine.offsetWidth;
    el.timerLine.style.transition = `width ${state.timerDuration}s linear`; el.timerLine.style.width = '0%';

    state.timer = setTimeout(() => {
      if(!state.lock) {
        state.score.bad++; state.score.streak = 0; updateScore();
        el.qSub.textContent = "時間到！"; state.lock = true;
        const correctBtn = el.grid.querySelector(`button[data-idx="${state.current.answerIdx}"]`);
        if(correctBtn) correctBtn.classList.add('correct');
        setTimeout(nextQuestion, 1500);
      }
    }, ms);
  }
  function stopTimer() {
    clearTimeout(state.timer);
    el.timerLine.style.transition = 'none'; el.timerLine.style.width = '0%';
  }

  // --- ROUND SUMMARY ---
  function showSummary() {
    stopTimer();
    state.roundBestStreak = Math.max(state.roundBestStreak, state.score.streak);
    const ok = state.score.ok, bad = state.score.bad;
    const acc = (ok + bad) ? Math.round(ok / (ok + bad) * 100) : 0;

    const entries = Object.entries(state.wrongByDegree);
    const worst = entries.length ? entries.reduce((a, b) => b[1] > a[1] ? b : a) : null;

    document.getElementById('summaryRound').textContent = Math.floor(state.questionCount / state.roundSize);
    document.getElementById('summaryAcc').textContent = acc + '%';
    document.getElementById('summaryOk').textContent = ok;
    document.getElementById('summaryBad').textContent = bad;
    document.getElementById('summaryStreak').textContent = state.roundBestStreak;
    document.getElementById('summaryWeak').textContent = worst
      ? `最需加強：${worst[0]}（錯 ${worst[1]} 次）` : '全部答對！🎉';

    document.getElementById('summaryModal').classList.add('open');
  }

  // --- EVENTS ---
  const toggleOpts = document.querySelectorAll('.toggle-opt');
  toggleOpts.forEach(opt => {
    opt.addEventListener('click', () => {
      const grp = opt.dataset.grp;
      document.querySelectorAll(`.toggle-opt[data-grp="${grp}"]`).forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      state[grp] = opt.dataset.val;
      saveSettings();
      if(state.started) nextQuestion();
    });
  });

  document.getElementById('rootSelect').addEventListener('change', (e) => {
    state.root = e.target.value;
    saveSettings();
    if(state.started && state.keymode === 'fixed') nextQuestion();
  });
  document.getElementById('timerCheck').addEventListener('change', (e) => {
    state.timerEnabled = e.target.checked;
    document.getElementById('timerDurationRow').style.display = e.target.checked ? 'flex' : 'none';
    saveSettings();
    if(state.started) nextQuestion();
  });
  document.getElementById('timerSeconds').addEventListener('change', (e) => {
    const v = parseInt(e.target.value, 10);
    if(v >= 1 && v <= 60) state.timerDuration = v;
    else e.target.value = state.timerDuration;
    saveSettings();
    if(state.started && state.timerEnabled) nextQuestion();
  });
  document.getElementById('audioCheck').addEventListener('change', (e) => {
    state.audioEnabled = e.target.checked;
    saveSettings();
  });

  // F4: 鍵盤快捷鍵
  document.addEventListener('keydown', (e) => {
    if(!state.started || state.lock) return;
    const n = parseInt(e.key, 10);
    if(n >= 1) {
      const btns = el.grid.querySelectorAll('.choice-btn');
      if(btns[n - 1]) btns[n - 1].click();
    }
  });

  // F7: 回合摘要繼續按鈕
  document.getElementById('summaryNextBtn').addEventListener('click', () => {
    document.getElementById('summaryModal').classList.remove('open');
    state.wrongByDegree = {};
    state.roundBestStreak = 0;
    nextQuestion();
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    AudioEngine.init(); // Initialize Audio Context on first click
    state.started = true;
    nextQuestion();
  });
  
  el.replayBtn.addEventListener('click', () => {
    if(state.current && state.audioEnabled) {
        AudioEngine.playChord(state.current.target.plainName);
        el.replayBtn.classList.add('playing');
        setTimeout(()=>el.replayBtn.classList.remove('playing'), 800);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state.score = { ok:0, bad:0, streak:0 }; updateScore();
  });

  const modal = document.getElementById('settingsModal');
  document.getElementById('btnSettings').onclick = () => modal.classList.add('open');
  document.getElementById('closeSettings').onclick = () => modal.classList.remove('open');
  modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('open'); });

  // --- SETTINGS PERSISTENCE ---
  function saveSettings() {
    localStorage.setItem('chord_settings', JSON.stringify({
      mode: state.mode, keymode: state.keymode, root: state.root,
      scaleType: state.scaleType, chordSet: state.chordSet,
      timerEnabled: state.timerEnabled, timerDuration: state.timerDuration,
      audioEnabled: state.audioEnabled,
      degreeFilter: state.degreeFilter
    }));
  }

  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem('chord_settings') || '{}');
      if(s.mode) state.mode = s.mode;
      if(s.keymode) state.keymode = s.keymode;
      if(s.root) state.root = s.root;
      if(s.scaleType) state.scaleType = s.scaleType;
      if(s.chordSet) state.chordSet = s.chordSet;
      if(s.timerEnabled != null) state.timerEnabled = s.timerEnabled;
      if(s.timerDuration) state.timerDuration = s.timerDuration;
      if(s.audioEnabled != null) state.audioEnabled = s.audioEnabled;
      if(Array.isArray(s.degreeFilter) && s.degreeFilter.length) state.degreeFilter = s.degreeFilter;
    } catch(e) {}
    syncSettingsUI();
  }

  function syncSettingsUI() {
    document.querySelectorAll('.toggle-opt').forEach(opt => {
      opt.classList.toggle('active', state[opt.dataset.grp] === opt.dataset.val);
    });
    document.getElementById('rootSelect').value = state.root;
    document.getElementById('audioCheck').checked = state.audioEnabled;
    document.getElementById('timerCheck').checked = state.timerEnabled;
    document.getElementById('timerSeconds').value = state.timerDuration;
    if(state.timerEnabled) document.getElementById('timerDurationRow').style.display = 'flex';
  }

  // --- DEGREE FILTER INIT ---
  function initDegreeFilter() {
    const row = document.getElementById('degreeFilterRow');
    ROMAN.forEach((r, i) => {
      const btn = document.createElement('button');
      btn.textContent = r;
      btn.dataset.deg = i;
      const active = state.degreeFilter.includes(i);
      btn.style.cssText = `padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--card-border);font-weight:600;transition:0.2s;background:${active ? 'var(--primary)' : 'rgba(255,255,255,0.05)'};color:white;`;
      btn.addEventListener('click', () => {
        const idx = state.degreeFilter.indexOf(i);
        if(idx > -1 && state.degreeFilter.length > 1) {
          state.degreeFilter.splice(idx, 1);
          btn.style.background = 'rgba(255,255,255,0.05)';
        } else if(idx === -1) {
          state.degreeFilter.push(i);
          btn.style.background = 'var(--primary)';
        }
        saveSettings();
      });
      row.appendChild(btn);
    });
  }

  // Init
  loadVisits();
  loadSettings();
  initDegreeFilter();
  function loadVisits(){
    const count = localStorage.getItem('chord_visits') || 0;
    const newCount = Number(count) + 1;
    localStorage.setItem('chord_visits', newCount);
    document.getElementById('visitCount').textContent = newCount;
  }
})();
</script>
</body>
</html>
